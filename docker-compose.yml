services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-partha}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      target: migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ${APP_IMAGE:-partha-app:local}
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      target: runner
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "4000"

  site:
    image: ${SITE_IMAGE:-partha-site:local}
    build:
      context: .
      dockerfile: apps/site/Dockerfile
      target: runner
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "4001"

  docs:
    image: ${DOCS_IMAGE:-partha-docs:local}
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
      target: runner
    restart: unless-stopped
    expose:
      - "4002"

  nginx:
    image: nginx:1.27
    depends_on:
      - app
      - site
      - docs
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt:rw

volumes:
  postgres_data:
    name: postgres_data
  letsencrypt:
    name: letsencrypt
