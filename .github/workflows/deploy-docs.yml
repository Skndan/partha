name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "packages/eslint-config/**"
      - "packages/typescript-config/**"
      - "apps/docs/Dockerfile"
      - "docker-compose.yml"
      - ".github/actions/container-version/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - apps/docs/**
              - packages/eslint-config/**
              - packages/typescript-config/**
              - package.json
              - bun.lock
              - turbo.json
              - apps/docs/Dockerfile
              - docker-compose.yml
              - .github/actions/container-version/**
              - .github/workflows/deploy-docs.yml

  release:
    name: release
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: production-docs

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tags
        id: container
        uses: ./.github/actions/container-version
        with:
          package-json: apps/docs/package.json
          image-name: partha-docs

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/docs/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.container.outputs.tags }}
          labels: ${{ steps.container.outputs.labels }}
          build-args: |
            VERSION=${{ steps.container.outputs.version }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish release summary
        run: |
          {
            echo "### Docs container release"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${{ steps.container.outputs.version }}\` |"
            echo "| Image | \`${{ steps.container.outputs.image }}\` |"
            echo "| Primary tag | \`${{ steps.container.outputs.primary-tag }}\` |"
            echo ""
            echo "Set \`DOCS_IMAGE=${{ steps.container.outputs.image }}:${{ steps.container.outputs.primary-tag }}\` in the server \`.env\`, then pull and restart."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull docs
            docker compose up -d docs
