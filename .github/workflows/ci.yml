name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: partha
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d partha"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/partha
      BETTER_AUTH_SECRET: ci-test-secret-ci-test-secret-ci-test-secret-12
      BETTER_AUTH_URL: http://localhost:4000
      NEXT_PUBLIC_URL: http://localhost:4000
      SKIP_ENV_VALIDATION: "1"
      RUN_INTEGRATION_TESTS: "1"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push database schema
        working-directory: apps/app
        run: bun run db:push

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        working-directory: apps/app
        run: bun run test

      - name: Integration tests
        working-directory: apps/app
        run: bun run test:integration

      - name: Build app
        run: bun run build:app

      - name: Build site
        run: bun run build:site

      - name: Build docs
        run: bun run build:docs
