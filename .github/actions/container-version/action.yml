name: Container version and tags
description: Resolve semver from package.json and produce immutable GHCR tag set (no environment-based tags)
inputs:
  package-json:
    description: Path to package.json (e.g. apps/app/package.json)
    required: true
  image-name:
    description: Image repository name (e.g. partha-app)
    required: true
  registry:
    description: Container registry host
    required: false
    default: ghcr.io
outputs:
  version:
    description: Semver from package.json
    value: ${{ steps.resolve.outputs.version }}
  image:
    description: Full image repository (registry/owner/name)
    value: ${{ steps.resolve.outputs.image }}
  primary-tag:
    description: Primary release tag (semver only)
    value: ${{ steps.resolve.outputs.primary_tag }}
  tags:
    description: Newline-separated tags for docker/build-push-action
    value: ${{ steps.resolve.outputs.tags }}
  labels:
    description: OCI label lines for docker/build-push-action
    value: ${{ steps.resolve.outputs.labels }}
runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        PACKAGE_JSON: ${{ inputs.package-json }}
        IMAGE_NAME: ${{ inputs.image-name }}
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -euo pipefail

        if [[ ! -f "$PACKAGE_JSON" ]]; then
          echo "package.json not found: $PACKAGE_JSON" >&2
          exit 1
        fi

        VERSION="$(node -p "require('./${PACKAGE_JSON}').version")"
        if [[ -z "$VERSION" || "$VERSION" == "undefined" || "$VERSION" == "null" ]]; then
          echo "Invalid version in $PACKAGE_JSON" >&2
          exit 1
        fi

        if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
          echo "Version must be semver (got: $VERSION)" >&2
          exit 1
        fi

        OWNER_LC="$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
        IMAGE="${REGISTRY}/${OWNER_LC}/${IMAGE_NAME}"
        SHORT_SHA="${GITHUB_SHA:0:7}"

        {
          echo "version=${VERSION}"
          echo "image=${IMAGE}"
          echo "primary_tag=${VERSION}"
          echo "tags<<EOF"
          echo "${IMAGE}:${VERSION}"
          echo "${IMAGE}:${VERSION}-${SHORT_SHA}"
          echo "${IMAGE}:sha-${SHORT_SHA}"
          echo "EOF"
          echo "labels<<EOF"
          echo "org.opencontainers.image.title=${IMAGE_NAME}"
          echo "org.opencontainers.image.version=${VERSION}"
          echo "org.opencontainers.image.revision=${GITHUB_SHA}"
          echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          echo "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
